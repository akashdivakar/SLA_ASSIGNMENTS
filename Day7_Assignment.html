<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Selectors</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="header">Welcome to CSS Selectors</div>

  <div class="box">

    <p class="intro">This is the intro paragraph in italic style.</p>

  </div>
